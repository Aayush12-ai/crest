version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: cms_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cms_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingest:
    build: ./services/ingest
    container_name: cms_ingest
    env_file: .env
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/ingest:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  twilio-channel:
    build: ./services/channels/twilio
    container_name: cms_twilio_channel
    env_file: .env
    ports:
      - "8005:8005"
    depends_on:
      - ingest
    environment:
      INGEST_SERVICE_URL: http://ingest:8000
    volumes:
      - ./services/channels/twilio:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload

volumes:
  postgres_data:
